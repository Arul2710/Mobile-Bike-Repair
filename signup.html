<!DOCTYPE html>
<html lang="en" class="scroll-smooth" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | GearUp</title>
    <script src="tailwind.js"></script>
    <link rel="icon" type="image/png" href="img/fav icons.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .gradient-bg { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .gradient-bg-hover:hover { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
        .accent-gradient {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }
        /* Mirror icons in RTL mode */
        [dir="rtl"] .fa-arrow-left { transform: rotate(180deg); }
        [dir="rtl"] .relative i { left: auto; right: 1rem; }
        [dir="rtl"] input { padding-left: 1rem !important; padding-right: 3rem !important; }
        [dir="rtl"] #toggle-password { right: auto; left: 1rem; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 min-h-screen flex flex-col">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white dark:bg-gray-900 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
               <a href="index.html" class="flex items-center gap-1.5 sm:gap-2 flex-shrink-0">
                    <div class="w-8 h-8 sm:w-9 sm:h-9 md:w-10 md:h-10 accent-gradient rounded-xl flex items-center justify-center shadow-md">
                        <i class="fas fa-motorcycle text-white text-sm sm:text-base md:text-lg"></i>
                    </div>
                    <span class="text-base sm:text-lg md:text-xl font-bold" style="background: linear-gradient(135deg, #3b82f6, #2563eb); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">GearUp</span>
                </a>
                
                <div class="flex items-center gap-2">
                    <button id="dir-toggle" class="px-3 h-10 rounded-xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center gap-2 text-xs font-bold text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all">
                        <i class="fas fa-language text-lg"></i>
                        <span id="dir-text">LTR</span>
                    </button>

                    <button id="theme-toggle" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center hover:bg-gray-200 dark:hover:bg-gray-700 transition-all">
                        <i class="fas fa-moon text-gray-600 dark:hidden"></i>
                        <i class="fas fa-sun text-yellow-400 hidden dark:block"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center pt-24 pb-12 px-4">
        <div class="max-w-md w-full">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Create Account</h1>
                <p class="text-gray-600 dark:text-gray-400">Join thousands of happy riders</p>
            </div>

            <div id="signup-success" class="hidden mb-6 p-4 bg-green-100 dark:bg-green-900/30 border border-green-300 dark:border-green-700 rounded-xl text-center">
                <i class="fas fa-check-circle text-green-500 text-2xl mb-2"></i>
                <p class="text-green-700 dark:text-green-300">Account created successfully! Redirecting...</p>
            </div>

            <form id="signup-form" class="bg-white dark:bg-gray-800 rounded-3xl p-8 shadow-xl">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Full Name</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="signup-name" placeholder="Enter your full name" class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-white transition-all focus:ring-2 focus:ring-primary outline-none" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Phone Number</label>
                        <div class="relative">
                            <i class="fas fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="tel" id="signup-phone" placeholder="Enter phone number" class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-white transition-all focus:ring-2 focus:ring-primary outline-none" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="email" id="signup-email" placeholder="Enter email address" class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-white transition-all focus:ring-2 focus:ring-primary outline-none" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="signup-password" placeholder="Create password" class="w-full pl-12 pr-12 py-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-white transition-all focus:ring-2 focus:ring-primary outline-none" required>
                            <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">Must be at least 8 characters with 1 number</p>
                    </div>

                    <div>
                        <label class="flex items-start gap-2 cursor-pointer">
                            <input type="checkbox" id="terms" class="w-4 h-4 mt-1 rounded border-gray-300 text-primary focus:ring-primary" required>
                            <span class="text-sm text-gray-600 dark:text-gray-400">
                                I agree to the <a href="#" class="text-primary hover:underline">Terms of Service</a> and <a href="#" class="text-primary hover:underline">Privacy Policy</a>
                            </span>
                        </label>
                    </div>

                    <button type="submit" class="w-full gradient-bg py-4 rounded-xl text-white font-bold text-lg gradient-bg-hover transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/30">
                        <i class="fas fa-user-plus"></i>
                        Create Account
                    </button>
                </div>

                <div class="mt-8">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-300 dark:border-gray-700"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-4 bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400">Or sign up with</span>
                        </div>
                    </div>

                    <div class="mt-6 grid grid-cols-2 gap-4">
                        <button type="button" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-700 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                            <i class="fab fa-google text-red-500"></i>
                            <span class="text-gray-700 dark:text-gray-200 font-medium">Google</span>
                        </button>
                        <button type="button" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-700 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                            <i class="fab fa-facebook text-blue-600"></i>
                            <span class="text-gray-700 dark:text-gray-200 font-medium">Facebook</span>
                        </button>
                    </div>
                </div>

                <p class="text-center mt-6 text-gray-600 dark:text-gray-400">
                    Already have an account? <a href="login.html" class="text-primary font-medium hover:underline">Sign in</a>
                </p>
            </form>

        </div>
    </main>

   

    <script>
        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        }
        
        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });

        // Direction (LTR/RTL) Toggle Logic
        const dirToggle = document.getElementById('dir-toggle');
        const dirText = document.getElementById('dir-text');

        dirToggle.addEventListener('click', () => {
            const isRTL = html.getAttribute('dir') === 'rtl';
            html.setAttribute('dir', isRTL ? 'ltr' : 'rtl');
            dirText.innerText = isRTL ? 'LTR' : 'RTL';
        });

        // Password Visibility Logic
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('signup-password');
        
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        // Form Submit Logic
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('signup-success').classList.remove('hidden');
            
            setTimeout(() => {
                // window.location.href = 'dashboard.html';
                alert('Account Created! (Redirecting simulation)');
            }, 1500);
        });
    </script>
</body>
</html>
