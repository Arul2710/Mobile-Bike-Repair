<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Road Blocked!</title>
    <link rel="icon" type="image/png" href="img/fav icons.png">
    <script src="tailwind.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        .animate-bike {
            animation: float 3s ease-in-out infinite;
        }
        .road-line {
            animation: moveRoad 2s linear infinite;
        }
        @keyframes moveRoad {
            from { stroke-dashoffset: 40; }
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body class="bg-blue-50 flex items-center justify-center h-screen overflow-hidden">

    <div class="text-center px-4">
        <div class="relative flex justify-center mb-8">
            <div class="animate-bike text-blue-600">
                <i data-lucide="bike" size="120" stroke-width="1.5"></i>
            </div>
            <div class="absolute -top-4 right-1/4 text-blue-400 animate-bounce">
                <i data-lucide="wrench" size="32"></i>
            </div>
        </div>

        <h1 class="text-9xl font-extrabold text-blue-900 opacity-20">404</h1>
        <div class="relative -mt-20">
            <h2 class="text-3xl font-bold text-blue-800 mb-4">Aiyoyo! Engine Seize Ayidichu.</h2>
            <p class="text-blue-600 mb-8 max-w-md mx-auto">
                Ninga theduna page "Breakdown" ayidichu. Kavalapadathinga, namma garage-ku thirumba polam!
            </p>

            <a href="/" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full transition-all transform hover:scale-105 shadow-lg">
                <i data-lucide="home" size="20"></i>
                Back to Garage
            </a>
        </div>

        <div class="mt-12 opacity-30">
            <svg width="200" height="10" viewBox="0 0 200 10" class="mx-auto">
                <line x1="0" y1="5" x2="200" y2="5" stroke="#1e40af" stroke-width="4" stroke-dasharray="20,10" class="road-line" />
            </svg>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
